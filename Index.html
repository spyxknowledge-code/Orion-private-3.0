<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Orion Private Chat</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: #0b0e1a; min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(25px); border:1px solid rgba(255,255,255,0.08); border-radius: 40px; padding: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); width:100%; max-width:850px; height:95vh; display:flex; flex-direction:column; transition: all 0.4s ease; }
    .hidden { display:none !important; }
    .page { animation: fadeScale 0.4s ease; flex:1; display:flex; flex-direction:column; }
    @keyframes fadeScale { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
    input, button { width:100%; padding: 14px 18px; margin: 8px 0; border: none; border-radius: 20px; background: rgba(255,255,255,0.07); color: #eee; font-size: 1rem; outline: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
    input:focus { outline: 2px solid #6c5ce7; background: rgba(255,255,255,0.12); }
    button { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; font-weight: 600; cursor: pointer; }
    button:hover { transform: scale(1.02); opacity: 0.9; }
    .flex { display: flex; gap: 12px; flex-wrap: wrap; }
    .flex > * { flex:1; min-width:140px; }
    .chat-container { flex:1; display:flex; flex-direction:column; overflow:hidden; margin-top:8px; }
    .chat-header { display:flex; justify-content:space-between; align-items:center; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05); }
    .chat-box { flex:1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 24px; padding: 16px; margin: 8px 0; scroll-behavior:smooth; }
    .msg-wrapper { margin:6px 0; display:flex; flex-direction:column; align-items:flex-start; }
    .msg-wrapper.self { align-items:flex-end; }
    .msg { padding: 10px 16px; border-radius: 18px; max-width: 80%; word-wrap: break-word; position:relative; animation: slideUp 0.3s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .msg .sender { font-size: 0.7rem; font-weight:600; margin-bottom:2px; opacity:0.8; }
    .msg .text { font-size:1rem; }
    .msg .meta { display:flex; justify-content:flex-end; align-items:center; gap:6px; font-size:0.65rem; opacity:0.6; margin-top:4px; }
    .msg .meta .tick { color: #4fc3f7; font-size:0.8rem; }
    .msg .meta .tick.read { color: #4fc3f7; }
    .msg .meta .tick.unread { color: #888; }
    .msg-wrapper.self .msg { background: rgba(0,200,200,0.15); }
    .msg-wrapper.other .msg { background: rgba(108,92,231,0.2); }
    .msg.edited::after { content: " (edited)"; font-size:0.6rem; opacity:0.5; margin-left:4px; }
    .notification { position:fixed; top:20px; right:20px; background: #1e272e; padding: 12px 24px; border-radius: 40px; color:white; box-shadow: 0 10px 30px rgba(0,0,0,0.6); animation: slideDown 0.5s ease; z-index:999; }
    @keyframes slideDown { from { transform: translateY(-80px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .online-badge { background: #00b894; padding: 4px 16px; border-radius: 30px; font-size:0.8rem; }
    .typing-indicator { color: #b2bec3; font-style: italic; font-size:0.8rem; margin:4px 0; animation: pulse 1s infinite; }
    @keyframes pulse { 0%{opacity:0.5;} 50%{opacity:1;} 100%{opacity:0.5;} }
    .dashboard-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; text-align: center; transition: 0.3s; cursor: pointer; }
    .dashboard-btn:hover { background: rgba(108,92,231,0.2); transform: scale(1.02); }
    .dashboard-btn h2 { color: white; margin-bottom: 8px; }
    .dashboard-btn p { color: #b2bec3; font-size: 0.9rem; }
    .back-btn { background: #636e72; margin-top: 10px; width:auto; padding: 8px 24px; }
    .title { color: white; text-align:center; margin-bottom: 16px; }
    .subtitle { color: #b2bec3; text-align:center; margin-bottom: 20px; }
    .context-menu { position:fixed; background:#2d3436; border-radius:12px; padding:10px; box-shadow:0 10px 30px rgba(0,0,0,0.7); z-index:1000; display:none; }
    .context-menu button { background:transparent; color:white; border:none; padding:6px 14px; width:100%; text-align:left; cursor:pointer; border-radius:6px; }
    .context-menu button:hover { background:rgba(255,255,255,0.1); }
    .brand { margin-top: 4px; color: rgba(255,255,255,0.12); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; text-align:center; }
    .brand strong { color: rgba(255,255,255,0.25); font-weight:400; }
  </style>
</head>
<body>
<div id="app">
  <!-- Auth -->
  <div id="authPage" class="glass page">
    <h1 class="title">🔐 Orion Private Chat</h1>
    <p class="subtitle">Private • End-to-End Encrypted</p>
    <div id="authForm">
      <input type="text" id="authUsername" placeholder="Username">
      <input type="email" id="authEmail" placeholder="Email">
      <input type="password" id="authPassword" placeholder="Password">
      <div class="flex">
        <button id="registerBtn">Sign Up</button>
        <button id="loginBtn" style="background:linear-gradient(135deg,#00b894,#55efc4);">Log In</button>
      </div>
    </div>
    <div id="authError" style="color:#ff6b6b;margin-top:10px;display:none;"></div>
  </div>

  <!-- Dashboard -->
  <div id="dashboardPage" class="glass page hidden">
    <h1 class="title">👋 Welcome, <span id="dashUsername"></span></h1>
    <div style="display:flex;flex-direction:column;gap:16px;margin:20px 0;">
      <div class="dashboard-btn" id="createRoomBtn">
        <h2>🆕 Create Room</h2>
        <p>Make a new room with ID & password – share with friends</p>
      </div>
      <div class="dashboard-btn" id="joinRoomBtn">
        <h2>🔗 Join Room</h2>
        <p>Enter existing room ID and password</p>
      </div>
    </div>
    <button id="logoutDashBtn" style="background:#d63031;width:auto;padding:8px 24px;">Logout</button>
    <div class="brand"><strong>✦ ORION PRIVATE CHAT ✦</strong></div>
  </div>

  <!-- Create/Join -->
  <div id="roomActionPage" class="glass page hidden">
    <h2 id="roomActionTitle" class="title">Create Room</h2>
    <input type="text" id="roomIdInput" placeholder="Room ID (choose unique)">
    <input type="password" id="roomPassInput" placeholder="Room password">
    <button id="roomActionSubmit" style="margin-top:10px;">Submit</button>
    <button id="roomActionBack" class="back-btn">Back</button>
    <div id="roomActionError" style="color:#ff6b6b;margin-top:10px;display:none;"></div>
  </div>

  <!-- Chat -->
  <div id="chatPage" class="glass page hidden" style="padding:16px;">
    <div class="chat-header">
      <h2 style="color:white;">💬 <span id="chatRoomId"></span></h2>
      <span id="onlineCount" class="online-badge">🟢 0 online</span>
    </div>
    <div class="chat-container">
      <div id="chatMessages" class="chat-box"></div>
      <div id="typingIndicator" class="typing-indicator"></div>
      <div style="display:flex;gap:8px;">
        <input type="text" id="msgInput" placeholder="Type your message..." style="flex:3;">
        <button id="sendBtn" style="flex:1;">Send</button>
      </div>
    </div>
    <button id="leaveChatBtn" style="margin-top:8px;background:#d63031;width:auto;padding:8px 24px;align-self:flex-start;">Leave Room</button>
    <div class="brand"><strong>✦ ORION PRIVATE CHAT ✦</strong></div>
  </div>
</div>

<!-- Context menu -->
<div id="contextMenu" class="context-menu">
  <button id="editMsgBtn">✏️ Edit</button>
</div>

<script>
// ---------- CONFIG ----------
const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e84393','#00b894','#6c5ce7'];
const userColorMap = {};

function getUserColor(username) {
  if (!userColorMap[username]) {
    const idx = Object.keys(userColorMap).length % COLORS.length;
    userColorMap[username] = COLORS[idx];
  }
  return userColorMap[username];
}

let currentToken='', currentUser='', currentRoom='', roomSecret='', socket=null, isCreating=true;
let messageMap = {};
let currentContextMsgId = null;

// DOM refs
const authPage=document.getElementById('authPage'), dashboardPage=document.getElementById('dashboardPage'), roomActionPage=document.getElementById('roomActionPage'), chatPage=document.getElementById('chatPage');
const authUsername=document.getElementById('authUsername'), authEmail=document.getElementById('authEmail'), authPassword=document.getElementById('authPassword');
const registerBtn=document.getElementById('registerBtn'), loginBtn=document.getElementById('loginBtn'), authError=document.getElementById('authError');
const dashUsername=document.getElementById('dashUsername');
const createRoomBtn=document.getElementById('createRoomBtn'), joinRoomBtn=document.getElementById('joinRoomBtn'), logoutDashBtn=document.getElementById('logoutDashBtn');
const roomActionTitle=document.getElementById('roomActionTitle'), roomIdInput=document.getElementById('roomIdInput'), roomPassInput=document.getElementById('roomPassInput');
const roomActionSubmit=document.getElementById('roomActionSubmit'), roomActionBack=document.getElementById('roomActionBack'), roomActionError=document.getElementById('roomActionError');
const chatRoomId=document.getElementById('chatRoomId'), chatMessages=document.getElementById('chatMessages'), msgInput=document.getElementById('msgInput'), sendBtn=document.getElementById('sendBtn'), onlineCount=document.getElementById('onlineCount'), typingIndicator=document.getElementById('typingIndicator'), leaveChatBtn=document.getElementById('leaveChatBtn');
const contextMenu=document.getElementById('contextMenu'), editMsgBtn=document.getElementById('editMsgBtn');

function showNotification(t){const d=document.createElement('div');d.className='notification';d.innerText=t;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}
function showPage(p){[authPage,dashboardPage,roomActionPage,chatPage].forEach(x=>x.classList.add('hidden'));p.classList.remove('hidden');}
function setError(el,msg){if(msg){el.style.display='block';el.innerText=msg;}else{el.style.display='none';}}

// Auth
registerBtn.onclick=async()=>{const u=authUsername.value.trim(),e=authEmail.value.trim(),p=authPassword.value.trim();if(!u||!e||!p)return setError(authError,'All fields required');try{const r=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.error);currentToken=d.token;currentUser=d.username;showNotification('✅ Registered!');goDashboard();}catch(e){setError(authError,e.message);}};
loginBtn.onclick=async()=>{const u=authUsername.value.trim(),p=authPassword.value.trim();if(!u||!p)return setError(authError,'Username and password required');try{const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.error);currentToken=d.token;currentUser=d.username;showNotification('✅ Logged in!');goDashboard();}catch(e){setError(authError,e.message);}};
function goDashboard(){dashUsername.innerText=currentUser;showPage(dashboardPage);}

createRoomBtn.onclick=()=>{isCreating=true;roomActionTitle.innerText='🆕 Create Room';roomIdInput.value='';roomPassInput.value='';setError(roomActionError,null);showPage(roomActionPage);};
joinRoomBtn.onclick=()=>{isCreating=false;roomActionTitle.innerText='🔗 Join Room';roomIdInput.value='';roomPassInput.value='';setError(roomActionError,null);showPage(roomActionPage);};
roomActionBack.onclick=()=>showPage(dashboardPage);
roomActionSubmit.onclick=async()=>{const rid=roomIdInput.value.trim(),pass=roomPassInput.value.trim();if(!rid||!pass)return setError(roomActionError,'Room ID and password required');const endpoint=isCreating?'/create_room':'/join_room';try{const r=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+currentToken},body:JSON.stringify({roomId:rid,password:pass})});const d=await r.json();if(!r.ok)throw new Error(d.error);currentRoom=rid;roomSecret=pass;enterChat();}catch(e){setError(roomActionError,e.message);}};
logoutDashBtn.onclick=()=>{currentToken='';currentUser='';showPage(authPage);showNotification('Logged out');};

// Encryption
function encryptMessage(t,s){const k=CryptoJS.SHA256(s);const iv=CryptoJS.lib.WordArray.random(16);const e=CryptoJS.AES.encrypt(t,k,{iv,mode:CryptoJS.mode.CBC,padding:CryptoJS.pad.Pkcs7});return{encrypted:e.ciphertext.toString(CryptoJS.enc.Hex),iv:iv.toString(CryptoJS.enc.Hex)};}
function decryptMessage(eh,ivh,s){try{const k=CryptoJS.SHA256(s);const iv=CryptoJS.enc.Hex.parse(ivh);const c=CryptoJS.enc.Hex.parse(eh);const d=CryptoJS.AES.decrypt({ciphertext:c},k,{iv,mode:CryptoJS.mode.CBC,padding:CryptoJS.pad.Pkcs7});return d.toString(CryptoJS.enc.Utf8);}catch(e){console.error('Decrypt error',e);return '[Encrypted]';}}

// Chat
function enterChat(){
  chatRoomId.innerText='#'+currentRoom; showPage(chatPage); messageMap={};
  if(socket)socket.disconnect();
  socket=io('/',{auth:{token:currentToken}});
  socket.on('connect',()=>console.log('socket connected'));
  socket.on('user-joined',(d)=>{showNotification('👤 '+d.username+' joined'); updateOnline(d.count);});
  socket.on('user-left',(d)=>{showNotification('🚪 '+d.username+' left'); updateOnline(d.count);});
  socket.on('online-count',(c)=>updateOnline(c));
  socket.on('history',(msgs)=>{chatMessages.innerHTML='';msgs.forEach(m=>{if(m.sender&&m.encrypted_text&&m.iv){const dec=decryptMessage(m.encrypted_text,m.iv,roomSecret);const el=createMessageElement(m.id,m.sender,dec,m.timestamp,m.edited,JSON.parse(m.read_by||'[]'),m.sender===currentUser);chatMessages.appendChild(el);messageMap[m.id]=el;}});const ids=msgs.map(m=>m.id);if(ids.length>0)socket.emit('mark-read',ids);chatMessages.scrollTop=chatMessages.scrollHeight;});
  socket.on('new-message',(d)=>{const dec=decryptMessage(d.encrypted,d.iv,roomSecret);const isSelf=d.sender===currentUser;const el=createMessageElement(d.id,d.sender,dec,d.timestamp,d.edited||false,d.read_by||[],isSelf);chatMessages.appendChild(el);messageMap[d.id]=el;chatMessages.scrollTop=chatMessages.scrollHeight;if(!isSelf)socket.emit('mark-read',[d.id]);});
  socket.on('message-edited',(data)=>{const {msgId,encrypted,iv}=data;const dec=decryptMessage(encrypted,iv,roomSecret);const el=messageMap[msgId];if(el){const td=el.querySelector('.text');if(td)td.innerText=dec;const meta=el.querySelector('.meta');if(meta&&!meta.querySelector('.edited-flag')){const sp=document.createElement('span');sp.className='edited-flag';sp.innerText=' (edited)';sp.style.fontSize='0.6rem';sp.style.opacity='0.5';meta.prepend(sp);}}});
  socket.on('message-read',(data)=>{const {msgId,reader}=data;const el=messageMap[msgId];if(el&&el.classList.contains('self')){const tick=el.querySelector('.tick');if(tick){tick.innerText='✔✔';tick.className='tick read';}}});
  socket.on('user-typing',(d)=>{typingIndicator.innerText=d.isTyping?d.username+' is typing...':'';});
  sendBtn.onclick=sendMessage;msgInput.onkeydown=(e)=>{if(e.key==='Enter')sendMessage();};msgInput.oninput=()=>{if(socket)socket.emit('typing',msgInput.value.length>0);};
  leaveChatBtn.onclick=()=>{if(socket)socket.disconnect();showPage(dashboardPage);showNotification('Left room');};
}

function createMessageElement(id,sender,text,timestamp,edited,readBy,isSelf){
  const wrap=document.createElement('div');wrap.className='msg-wrapper '+(isSelf?'self':'other');
  const msg=document.createElement('div');msg.className='msg';if(isSelf)msg.style.background='rgba(0,200,200,0.15)';else{const c=getUserColor(sender);msg.style.background=c+'33';msg.style.borderLeft='4px solid '+c;}if(edited)msg.classList.add('edited');
  const sn=document.createElement('div');sn.className='sender';sn.innerText=isSelf?'You':sender;msg.appendChild(sn);
  const tx=document.createElement('div');tx.className='text';tx.innerText=text;msg.appendChild(tx);
  const meta=document.createElement('div');meta.className='meta';
  const tm=document.createElement('span');tm.className='time';const d=new Date(timestamp);tm.innerText=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});meta.appendChild(tm);
  if(edited){const es=document.createElement('span');es.className='edited-flag';es.innerText=' (edited)';es.style.fontSize='0.6rem';es.style.opacity='0.5';meta.appendChild(es);}
  if(isSelf){const tick=document.createElement('span');tick.className='tick';const others=readBy.filter(u=>u!==currentUser);if(others.length>0){tick.innerText='✔✔';tick.className='tick read';}else{tick.innerText='✔';tick.className='tick unread';}meta.appendChild(tick);}
  msg.appendChild(meta);wrap.appendChild(msg);
  if(isSelf){wrap.addEventListener('contextmenu',(e)=>{e.preventDefault();currentContextMsgId=id;contextMenu.style.display='block';contextMenu.style.left=e.clientX+'px';contextMenu.style.top=e.clientY+'px';});}
  return wrap;
}

editMsgBtn.onclick=()=>{if(currentContextMsgId===null)return;const el=messageMap[currentContextMsgId];if(!el)return;const td=el.querySelector('.text');if(!td)return;const old=td.innerText;const nw=prompt('Edit your message:',old);if(nw!==null&&nw.trim()!==''&&nw!==old){const {encrypted,iv}=encryptMessage(nw.trim(),roomSecret);socket.emit('edit-message',{msgId:currentContextMsgId,encrypted,iv});}contextMenu.style.display='none';currentContextMsgId=null;};
document.addEventListener('click',()=>{contextMenu.style.display='none';currentContextMsgId=null;});

function updateOnline(c){onlineCount.innerText='🟢 '+c+' online';}
async function sendMessage(){const t=msgInput.value.trim();if(!t||!socket)return;const {encrypted,iv}=encryptMessage(t,roomSecret);socket.emit('send-message',{encrypted,iv});msgInput.value='';typingIndicator.innerText='';}
</script>
</body>
</html>
